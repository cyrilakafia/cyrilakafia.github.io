<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog Post | Cyril Akafia</title>

  <meta name="author" content="Cyril Selase Kwaku Akafia">
  <meta name="theme-color" content="#ffffff">
  <script>
    (() => {
      const resolveTheme = (choice, prefersDark) => {
        if (choice === "light" || choice === "dark") {
          return choice;
        }

        return prefersDark ? "dark" : "light";
      };

      try {
        const storedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const themeChoice = ["light", "dark", "system"].includes(storedTheme) ? storedTheme : "system";
        const theme = resolveTheme(themeChoice, prefersDark);
        document.documentElement.dataset.themeChoice = themeChoice;
        document.documentElement.dataset.theme = theme;
        const themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta) {
          themeMeta.setAttribute("content", theme === "dark" ? "#0f1419" : "#ffffff");
        }
      } catch (error) {
        document.documentElement.dataset.themeChoice = "system";
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../styles.css">
  <script src="../script.js" defer></script>
</head>
